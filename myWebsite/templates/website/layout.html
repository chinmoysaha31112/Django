{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django eCommerce{% endblock %} - Premium Store</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm" style="background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%) !important;">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="{% url 'newApp:home' %}">
                <i class="bi bi-cart-check"></i> Store
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fs-5 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{% url 'newApp:home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{% url 'newApp:about' %}">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="{% url 'newApp:contact' %}">Contact</a>
                    </li>
                    <li class="nav-item ms-2">
                        <a class="nav-link px-3 position-relative" href="{% url 'newApp:view_cart' %}" title="Cart">
                            <i class="bi bi-cart3 fs-4"></i>
                            {% if cart_count and cart_count > 0 %}
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:0.65rem;">
                                {{ cart_count }}
                            </span>
                            {% endif %}
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer intentionally removed as requested -->
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</body>
</html>
