<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Registration</h1>
        <form>
            <div class="row">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>

            <div class="row">
                <label>Email Address</label>
                <input type="email" placeholder="john@example.com" required>
            </div>

            <div class="row">
                <label>Engineering Department</label>
                <select required>
                    <option value="" disabled selected>Select Department</option>
                    <option value="agricultural">Agricultural Engineering</option>
                    <option value="biomedical">Bio Medical Engineering</option>
                    <option value="civil">Civil Engineering</option>
                    <option value="electrical">Electrical Engineering</option>
                    <option value="mechanical">Mechanical Engineering</option>
                    <option value="it">Information Technology</option>
                    <option value="cs">Computer Science & Engineering</option>
                    <option value="aiml">AIML & CST</option>
                    <option value="electronics">Electronics & Communication Engineering</option>
                </select>
            </div>

            <div class="row">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <div class="row">
                <label>Confirm Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit">Create Account</button>
        </form>
        <p class="login">
            Already have an account? <a href="#">Log in</a>
        </p>
    </div>
</body>
</html>
